#:schema https://developers.openai.com/codex/config-schema.json
# .codex/config.toml — Project-level Codex configuration
# Loaded automatically when this project is trusted.
# User config at ~/.codex/config.toml takes lower precedence.

# ── Model ──────────────────────────────────────────────────────────
model = "codex-mini-latest"
model_reasoning_effort = "high"

# ── Approvals & Sandbox ────────────────────────────────────────────
# on-request: Codex pauses for approval on commands it can't auto-approve via rules.
# Switch to "never" once you've verified your .codex/rules/default.rules coverage.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

# ── Communication ──────────────────────────────────────────────────
personality = "pragmatic"

# ── Web search ─────────────────────────────────────────────────────
web_search = "cached"

# ── Feature flags ──────────────────────────────────────────────────
suppress_unstable_features_warning = true  # Suppress warning for under-development feature flags

[features]
codex_hooks   = true    # Enable lifecycle hooks from .codex/hooks.json
multi_agent   = true    # Enable subagent collaboration (explorer, reviewer, etc.)
memories      = false   # Cross-session recall — enable when useful, costs tokens
shell_snapshot = true   # Speed up repeated commands
undo          = false   # Per-turn git ghost snapshots — opt-in when useful

# ── Subagent limits ────────────────────────────────────────────────
[agents]
max_threads = 6    # Concurrent agent thread cap
max_depth   = 1    # Prevent unbounded recursive delegation

# ── Shell environment forwarding ───────────────────────────────────
# Only forward the variables Codex needs — never leak credentials.
[shell_environment_policy]
inherit = "none"
include_only = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL", "NO_COLOR",
                "GIT_AUTHOR_NAME", "GIT_AUTHOR_EMAIL", "CODEX_HOME"]

# ── MCP servers ────────────────────────────────────────────────────
